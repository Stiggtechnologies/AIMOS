name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate: the production build (Vite/esbuild) does NOT typecheck, so a
      # broken type can otherwise ship to production. Run tsc explicitly first.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Blocking on lint ERRORS (0 today). The remaining ~830 items are tracked
    # as warnings (mostly no-explicit-any) and do not fail the build while the
    # typed-migration backlog is burned down; dead imports and real smells are
    # hard errors.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
