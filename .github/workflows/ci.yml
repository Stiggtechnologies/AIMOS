name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate: the production build (Vite/esbuild) does NOT typecheck, so a
      # broken type can otherwise ship to production. Run tsc explicitly first.
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    # Informational only for now: the repo carries a large pre-existing lint
    # backlog (~1.1k issues, mostly no-explicit-any / no-unused-vars). Flip
    # continue-on-error to false once that backlog is burned down.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
